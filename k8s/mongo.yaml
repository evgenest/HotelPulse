apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: hotelpulse
spec:
  # If this namespace already has persistent MongoDB 7 data, use a fresh PVC
  # (or follow MongoDB's documented major-version upgrade path) before applying `mongo:8`.
  # Here, a fresh PVC is the simplest option; the API reseeds hotels on startup.
  selector:
    matchLabels:
      app: mongo
  serviceName: mongo
  replicas: 1
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:8
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: hotelpulse
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None  # headless for StatefulSet
